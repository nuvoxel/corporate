# Corporate Website Configuration - Base Values
# Override with environment-specific values files:
#   helm install corporate . -f values.yaml -f values-prod.yaml

environment: dev
namespace: corporate

# Container Images (GitHub Container Registry)
images:
  registry: ghcr.io/nuvoxel
  name: corporate-web
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - ghcr-secret

web:
  replicas: 1
  port: 3000
  resources:
    requests:
      memory: 64Mi
      cpu: 25m
    limits:
      memory: 256Mi
      cpu: 200m

# Ingress Configuration
ingress:
  enabled: false
  className: nginx
  tlsEnabled: false
  certManagerIssuer: letsencrypt-staging
  domain: nuvoxel.com
