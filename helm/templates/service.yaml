apiVersion: v1
kind: Service
metadata:
  name: corporate-web
  namespace: {{ .Values.namespace }}
  labels:
    app: corporate
    component: web
    environment: {{ .Values.environment }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: {{ .Values.web.port }}
      protocol: TCP
      name: http
  selector:
    app: corporate
    component: web
