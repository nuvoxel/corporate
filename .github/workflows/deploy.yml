name: Deploy Corporate Site

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'Dockerfile'
      - 'helm/**'
      - 'next.config.mjs'
      - 'package.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'Production'
        type: choice
        options:
          - Dev
          - Production

permissions:
  contents: write
  packages: write
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ARM642
    environment: ${{ github.event.inputs.environment || 'Production' }}

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'Production' }}
      REGISTRY: ghcr.io
      IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set environment variables
      id: set-env
      run: |
        ENV="${{ env.ENVIRONMENT }}"
        case "$ENV" in
          "Dev")
            HELM_ENV="dev"
            ;;
          "Production")
            HELM_ENV="prod"
            ;;
        esac
        echo "HELM_ENV=$HELM_ENV" >> $GITHUB_OUTPUT
        echo "NAMESPACE=corporate" >> $GITHUB_OUTPUT

        # Generate semantic version tag
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        echo "IMAGE_TAG=1.0.0-${SHORT_SHA}" >> $GITHUB_OUTPUT

    # ========================================================================
    # BUILD DOCKER IMAGE
    # ========================================================================

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.IMAGE_PREFIX }}/corporate-web:${{ steps.set-env.outputs.IMAGE_TAG }}
          ${{ env.IMAGE_PREFIX }}/corporate-web:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # ========================================================================
    # DEPLOY TO KUBERNETES
    # ========================================================================

    - name: Set up Kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Create namespace if not exists
      run: |
        kubectl create namespace ${{ steps.set-env.outputs.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

    - name: Create Docker registry secret
      run: |
        kubectl create secret docker-registry ghcr-secret \
          --namespace=${{ steps.set-env.outputs.NAMESPACE }} \
          --docker-server=ghcr.io \
          --docker-username=${{ github.actor }} \
          --docker-password=${{ secrets.GITHUB_TOKEN }} \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.12.0'

    - name: Deploy with Helm
      run: |
        HELM_ENV="${{ steps.set-env.outputs.HELM_ENV }}"
        IMAGE_TAG="${{ steps.set-env.outputs.IMAGE_TAG }}"
        NAMESPACE="${{ steps.set-env.outputs.NAMESPACE }}"

        helm upgrade --install corporate ./helm \
          --namespace=$NAMESPACE \
          -f helm/values.yaml \
          -f helm/values-${HELM_ENV}.yaml \
          --set images.tag=$IMAGE_TAG \
          --wait \
          --timeout 5m

    - name: Verify deployment
      run: |
        NAMESPACE="${{ steps.set-env.outputs.NAMESPACE }}"
        kubectl rollout status deployment/corporate-web --namespace=$NAMESPACE --timeout=120s
        echo "Deployment successful!"
        kubectl get pods --namespace=$NAMESPACE -l app=corporate

    # ========================================================================
    # POST-DEPLOYMENT
    # ========================================================================

    - name: Create deployment tag
      if: success()
      run: |
        HELM_ENV="${{ steps.set-env.outputs.HELM_ENV }}"
        TAG="deploy-${HELM_ENV}-$(date +%Y%m%d-%H%M%S)"
        git tag "$TAG"
        git push origin "$TAG"
